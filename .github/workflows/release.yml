name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --prod --frozen-lockfile

      - name: Build site
        run: pnpm build

      - name: Package release tarball
        run: |
          mkdir releases
          mkdir stage
          cp -r dist/ Caddyfile stage/
          tar czf "releases/${{ github.ref_name }}.tar.gz" -C stage .

      - name: Release
        uses: softprops/action-gh-release@v3
        if: github.ref_type == 'tag'
        with:
          files: releases/*.tar.gz
